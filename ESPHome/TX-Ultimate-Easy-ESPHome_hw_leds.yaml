####################################################################################################
#####                              TX Ultimate Easy for ESPHome                                #####
#####                  Repository: https://github.com/edwardtfn/TX-Ultimate-Easy               #####
####################################################################################################
##### Purpose: ESPHome - Hardware - LEDs                                                       #####
####################################################################################################
##### Author: edwardtfn - https://github.com/edwardtfn - https://buymeacoffee.com/edwardfirmo  #####
####################################################################################################
##### NOTE:                                                                                    #####
##### - Make changes ONLY if absolutely necessary and you have the required knowledge.         #####
##### - For normal system use, modifications to this file are NOT required.                    #####
####################################################################################################
---
substitutions:
  default_transition_length: 500ms

  LIGHT_MODE_BOTH_TEXT: "Both"
  LIGHT_MODE_DISABLED_TEXT: "Disabled"
  LIGHT_MODE_LEFT_TEXT: "Left"
  LIGHT_MODE_RIGHT_TEXT: "Right"
  LIGHT_MODE_BOTTOM_TEXT: "Bottom"
  LIGHT_MODE_TOP_TEXT: "Top"
  LIGHT_MODE_BOTTOM_OR_LEFT_TEXT: ${LIGHT_MODE_BOTTOM_TEXT if IS_EU_MODEL else LIGHT_MODE_LEFT_TEXT}
  LIGHT_MODE_TOP_OR_RIGHT_TEXT: ${LIGHT_MODE_TOP_TEXT if IS_EU_MODEL else LIGHT_MODE_RIGHT_TEXT}

  LIGHT_TRANSITION_TURN_ON: 0   # Transition time in msec
  LIGHT_TRANSITION_TURN_OFF: 0  # Transition time in msec
  LIGHT_BRIGHTNESS_TURN_ON: 0   # Brightness (1 to 100%, 0 to not set it)

  LIGHT_FULL_RESTORE_MODE: RESTORE_DEFAULT_OFF
  # Color and brightness are restored by the compact palette globals below.
  # Relay state remains authoritative for whether its indicator LEDs are on.
  LIGHT_SIDES_RESTORE_MODE: ALWAYS_OFF

  LIGHT_LED_COUNT: ${28 if IS_EU_MODEL else 32}
  LIGHT_MAX_ADDR: ${27 if IS_EU_MODEL else 31}

  TAG_HW_LEDS: tx_ultimate_easy.hw.leds

esphome:
  platformio_options:
    build_flags:
      - -D TX_ULTIMATE_EASY_HW_LEDS

globals:
  # Persistent format: 0xRRGGBBAA (AA is master brightness). Keeping one packed
  # value per group avoids the NVS pressure caused by separate channel globals.
  - id: led_bottom_state
    type: uint32_t
    restore_value: true
    initial_value: '4294967295'  # White, 100% brightness
  - id: led_left_state
    type: uint32_t
    restore_value: true
    initial_value: '4294967295'
  - id: led_right_state
    type: uint32_t
    restore_value: true
    initial_value: '4294967295'
  - id: led_top_state
    type: uint32_t
    restore_value: true
    initial_value: '4294967295'
  - id: led_all_state
    type: uint32_t
    restore_value: true
    initial_value: '4294967295'
  # US panels use Left/Right for relay indicators, leaving Bottom/Top available
  # as independent ambient lights. Persist only those two physical ON/OFF states:
  # bit 0 = Bottom, bit 1 = Top. EU panels ignore this value because Bottom/Top
  # are relay indicators there.
  - id: led_top_bottom_power
    type: uint8_t
    restore_value: true
    initial_value: '0'
  - id: led_groups_restoring
    type: bool
    restore_value: false
    initial_value: 'false'

output:
  # No-op outputs backing the virtual all-groups RGB picker. The selected values
  # are read from the light state and copied into the four persistent palettes.
  - id: out_led_palette_all_red
    platform: template
    type: float
    write_action:
      - lambda: |-
          // Virtual output - intentionally does not drive hardware.
  - id: out_led_palette_all_green
    platform: template
    type: float
    write_action:
      - lambda: |-
          // Virtual output - intentionally does not drive hardware.
  - id: out_led_palette_all_blue
    platform: template
    type: float
    write_action:
      - lambda: |-
          // Virtual output - intentionally does not drive hardware.

light:
  # These lights are controlling the LEDs on the device
  - id: light_full
    name: Light - All
    internal: true
    num_leds: 32
    pin: GPIO13
    restore_mode: ${LIGHT_FULL_RESTORE_MODE}
    platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: ws2812
    max_refresh_rate: 33ms
    use_psram: false
    # platform: neopixelbus
    # type: GRB
    # variant: WS2811

  # Those lights are available based on the model selections
  - &light_partition_with_effects
    id: lights_all
    name: Lights (all)
    platform: partition
    default_transition_length: ${default_transition_length}
    internal: false
    restore_mode: ${LIGHT_SIDES_RESTORE_MODE}
    on_turn_off:
      # An overlapping whole-strip partition clears every physical pixel. Restore
      # the independent US Top/Bottom states after that temporary override ends.
      - if:
          condition:
            and:
              - lambda: return ${1 if IS_US_MODEL else 0};
              - binary_sensor.is_on: bs_boot_completed
          then:
            - script.execute: led_groups_restore
    effects:
      - addressable_rainbow:
          name: "Rainbow"
          width: ${LIGHT_LED_COUNT}
      - addressable_rainbow:
          name: "Rainbow - Fast"
          width: ${LIGHT_LED_COUNT}
          speed: 50
      - pulse:
          name: "Pulse"
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Pulse - Slow"
          transition_length: 2s
          update_interval: 2s
      - addressable_scan:
          name: "Scan"
          move_interval: 100ms
          scan_width: 3
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 5%
          progress_interval: 4ms
      - addressable_random_twinkle:
          name: "Random Twinkle"
          twinkle_probability: 20%
          progress_interval: 32ms
      - addressable_fireworks:
          name: "Fireworks"
          update_interval: 32ms
          spark_probability: 10%
          use_random_color: false
          fade_out_rate: 120
      - addressable_flicker:
          name: "Flicker"
          update_interval: 16ms
          intensity: 5%
      - random:
          name: "Random"
    segments:
      - id: light_full
        from: 0
        to: ${LIGHT_MAX_ADDR}

  - &light_partition_sides
    id: light_bottom
    name: Light - Bottom
    platform: partition
    disabled_by_default: false
    entity_category: config
    icon: mdi:palette
    default_transition_length: ${default_transition_length}
    restore_mode: ${LIGHT_SIDES_RESTORE_MODE}
    internal: false
    on_state:
      - script.execute:
          id: led_group_save
          group: 0
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Pulse - Slow"
          transition_length: 2s
          update_interval: 2s
      - addressable_scan:
          name: "Scan"
          move_interval: 100ms
          scan_width: 3
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 5%
          progress_interval: 4ms
      - addressable_random_twinkle:
          name: "Random Twinkle"
          twinkle_probability: 20%
          progress_interval: 32ms
      - addressable_fireworks:
          name: "Fireworks"
          update_interval: 32ms
          spark_probability: 10%
          use_random_color: false
          fade_out_rate: 120
      - addressable_flicker:
          name: "Flicker"
          update_interval: 16ms
          intensity: 5%
      - random:
          name: "Random"
    segments:
      - id: light_full
        from: ${6 if IS_EU_MODEL else 9}
        to: ${12 if IS_EU_MODEL else 14}
        reversed: true

  # Virtual RGB picker that applies one color and brightness to all four groups.
  # It never drives the strip directly; relay status remains authoritative for
  # which physical segments are currently on.
  - id: light_led_palette_all
    name: LED Palette - All
    platform: rgb
    red: out_led_palette_all_red
    green: out_led_palette_all_green
    blue: out_led_palette_all_blue
    disabled_by_default: false
    entity_category: config
    icon: mdi:palette-swatch
    restore_mode: ALWAYS_ON
    on_state:
      - script.execute: led_palette_all_save

  - id: light_left
    name: Light - Left
    <<: *light_partition_sides
    on_state:
      - script.execute:
          id: led_group_save
          group: 1
    segments:
      - id: light_full
        from: ${13 if IS_EU_MODEL else 15}
        to: ${19 if IS_EU_MODEL else 24}
        reversed: true
  - id: light_right
    name: Light - Right
    <<: *light_partition_sides
    on_state:
      - script.execute:
          id: led_group_save
          group: 2
    segments:
      - id: light_full
        from: ${27 if IS_EU_MODEL else 31}
        to: ${27 if IS_EU_MODEL else 31}
        reversed: false
      - id: light_full
        from: 0
        to: ${5 if IS_EU_MODEL else 8}
        reversed: false
  - id: light_top
    name: Light - Top
    <<: *light_partition_sides
    on_state:
      - script.execute:
          id: led_group_save
          group: 3
    segments:
      - id: light_full
        from: ${20 if IS_EU_MODEL else 25}
        to: ${26 if IS_EU_MODEL else 30}
        reversed: false

script:
  - id: !extend boot_done
    then:
      # Load the saved palette into the four configuration entities. The relay
      # status renderer remains authoritative for physical on/off state.
      - script.execute: led_groups_restore

  - id: led_palette_all_save
    mode: restart
    then:
      - lambda: |-
          if (id(led_groups_restoring) || !id(bs_boot_completed)->state)
            return;

          const auto &values = light_led_palette_all->remote_values;
          // OFF is only a UI state for this virtual entity and must not erase the
          // last palette. A new palette is applied whenever it is ON and changed.
          if (!values.is_on())
            return;

          const auto to_byte = [](float value) -> uint8_t {
            value = std::max(0.0f, std::min(1.0f, value));
            return static_cast<uint8_t>(value * 255.0f + 0.5f);
          };
          const uint32_t packed =
              (static_cast<uint32_t>(to_byte(values.get_red())) << 24) |
              (static_cast<uint32_t>(to_byte(values.get_green())) << 16) |
              (static_cast<uint32_t>(to_byte(values.get_blue())) << 8) |
              static_cast<uint32_t>(to_byte(values.get_brightness()));

          id(led_all_state) = packed;
          id(led_bottom_state) = packed;
          id(led_left_state) = packed;
          id(led_right_state) = packed;
          id(led_top_state) = packed;
          led_groups_flush->execute();
          ESP_LOGD("${TAG_HW_LEDS}", "Saved one palette for all LED groups");

          #ifdef TX_ULTIMATE_EASY_NIGHT_MODE
          if (sw_night_mode->state) {
            // Keep Night Mode visually authoritative. The new group palette will
            // be rendered by show_relay_status when Night Mode is disabled.
            night_mode_apply->execute();
            return;
          }
          #endif

          led_groups_restore->execute();

  - id: led_group_save
    mode: queued
    max_runs: 8
    parameters:
      group: uint8_t
    then:
      - lambda: |-
          // Ignore component startup and our own restore calls. remote_values is
          // the requested target, unlike current_values which moves gradually
          // during a transition.
          if (id(led_groups_restoring) || !id(bs_boot_completed)->state)
            return;

          light::LightState *configured_light = nullptr;
          uint32_t *packed_state = nullptr;
          switch (group) {
            case 0:
              configured_light = light_bottom;
              packed_state = &id(led_bottom_state);
              break;
            case 1:
              configured_light = light_left;
              packed_state = &id(led_left_state);
              break;
            case 2:
              configured_light = light_right;
              packed_state = &id(led_right_state);
              break;
            case 3:
              configured_light = light_top;
              packed_state = &id(led_top_state);
              break;
            default:
              ESP_LOGE("${TAG_HW_LEDS}", "Invalid persistent LED group: %" PRIu8, group);
              return;
          }

          const auto &values = configured_light->remote_values;
          #if TX_ULTIMATE_EASY_IS_US_MODEL
          // Only Top and Bottom have an independent physical ON/OFF state on US
          // panels. Left and Right remain authoritative relay indicators.
          if (group == 0) {
            if (values.is_on())
              id(led_top_bottom_power) |= 0x01;
            else
              id(led_top_bottom_power) &= static_cast<uint8_t>(~0x01);
          } else if (group == 3) {
            if (values.is_on())
              id(led_top_bottom_power) |= 0x02;
            else
              id(led_top_bottom_power) &= static_cast<uint8_t>(~0x02);
          }
          #endif

          if (values.is_on()) {
            const auto to_byte = [](float value) -> uint8_t {
              value = std::max(0.0f, std::min(1.0f, value));
              return static_cast<uint8_t>(value * 255.0f + 0.5f);
            };
            *packed_state = (static_cast<uint32_t>(to_byte(values.get_red())) << 24) |
                            (static_cast<uint32_t>(to_byte(values.get_green())) << 16) |
                            (static_cast<uint32_t>(to_byte(values.get_blue())) << 8) |
                            static_cast<uint32_t>(to_byte(values.get_brightness()));
          }

          // An OFF command controls only the current output. It intentionally does
          // not erase the last palette, so the next relay ON uses the same values.
          ESP_LOGD("${TAG_HW_LEDS}", "Saved LED group %" PRIu8 " palette", group);
          led_groups_flush->execute();

          #ifdef TX_ULTIMATE_EASY_NIGHT_MODE
          // Changing a group while night mode is active updates its saved setting,
          // but night mode remains visually authoritative until it is disabled.
          if (sw_night_mode->state)
            night_mode_apply->execute();
          #endif

          #ifdef TX_ULTIMATE_EASY_HW_RELAYS
          // Repaint immediately so changing the palette does not leave the whole
          // side lit; each segment returns to the corresponding relay state.
          #ifdef TX_ULTIMATE_EASY_NIGHT_MODE
          if (!sw_night_mode->state)
          #endif
            show_relay_status->execute();
          #endif

  - id: led_groups_flush
    mode: restart
    then:
      # Coalesce rapid color-picker updates, then force the saved globals to flash
      # instead of waiting for ESPHome's default one-minute preference interval.
      - delay: 2s
      - lambda: global_preferences->sync();

  - id: led_groups_apply_all
    mode: restart
    then:
      - lambda: |-
          light::LightState *groups[] = {
            light_bottom, light_left, light_right, light_top
          };
          const uint32_t states[] = {
            id(led_bottom_state), id(led_left_state), id(led_right_state), id(led_top_state)
          };

          for (uint8_t group = 0; group < 4; group++) {
            const uint32_t packed = states[group];
            auto call = groups[group]->make_call();
            // US Top/Bottom are independent ambient lights, so their saved ON/OFF
            // state is restored. Left/Right stay off here and are repainted from
            // relay state below. EU Top/Bottom also remain relay-authoritative.
            bool restore_power = false;
            #if TX_ULTIMATE_EASY_IS_US_MODEL
            if (group == 0)
              restore_power = (id(led_top_bottom_power) & 0x01) != 0;
            else if (group == 3)
              restore_power = (id(led_top_bottom_power) & 0x02) != 0;
            #endif
            call.set_state(restore_power);
            call.set_rgb(((packed >> 24) & 0xFF) / 255.0f,
                         ((packed >> 16) & 0xFF) / 255.0f,
                         ((packed >> 8) & 0xFF) / 255.0f);
            call.set_brightness((packed & 0xFF) / 255.0f);
            call.set_transition_length(0);
            call.perform();
          }

          // Restore the virtual all-groups picker independently from the four
          // physical configuration partitions.
          const uint32_t all_packed = id(led_all_state);
          auto all_call = light_led_palette_all->make_call();
          all_call.set_state(true);
          all_call.set_rgb(((all_packed >> 24) & 0xFF) / 255.0f,
                           ((all_packed >> 16) & 0xFF) / 255.0f,
                           ((all_packed >> 8) & 0xFF) / 255.0f);
          all_call.set_brightness((all_packed & 0xFF) / 255.0f);
          all_call.set_transition_length(0);
          all_call.perform();

  - id: led_groups_restore
    mode: restart
    then:
      - globals.set:
          id: led_groups_restoring
          value: 'true'
      - script.execute: led_groups_apply_all
      - script.wait: led_groups_apply_all
      # Let all on_state callbacks caused by the calls above drain before saving is
      # re-enabled. This also keeps boot-time partition changes out of NVS.
      - delay: 50ms
      - globals.set:
          id: led_groups_restoring
          value: 'false'
      # This final repaint makes the boot order deterministic: even if the palette
      # restore briefly turned a whole side off, every relay segment now returns to
      # its restored switch state using the saved RGB/brightness values.
      - lambda: |-
          #ifdef TX_ULTIMATE_EASY_HW_RELAYS
          show_relay_status->execute();
          #endif

  - id: !extend dump_config
    then:
      - lambda: |-
          ESP_LOGCONFIG("${TAG_HW_LEDS}", "Transition times:\n"
                                          "  Default:     ${default_transition_length}\n"
                                          "  Turning on:  ${LIGHT_TRANSITION_TURN_ON ~ 'ms' if LIGHT_TRANSITION_TURN_ON > 0 else 'Disabled'}\n"
                                          "  Turning off: ${LIGHT_TRANSITION_TURN_OFF ~ 'ms' if LIGHT_TRANSITION_TURN_OFF > 0 else 'Disabled'}");
          ESP_LOGCONFIG("${TAG_HW_LEDS}", "LED restore modes:\n"
                                          "  Light - All: ${LIGHT_FULL_RESTORE_MODE}\n"
                                          "  Sides:       ${LIGHT_SIDES_RESTORE_MODE}");
          ESP_LOGCONFIG("${TAG_HW_LEDS}", "Persistent relay LED palettes: Enabled");
          ESP_LOGCONFIG("${TAG_HW_LEDS}", "Virtual all-groups palette: Enabled");
          if (${1 if IS_US_MODEL else 0}) {
            ESP_LOGCONFIG("${TAG_HW_LEDS}", "Persistent ambient power: Bottom=%s, Top=%s",
                          ONOFF((id(led_top_bottom_power) & 0x01) != 0),
                          ONOFF((id(led_top_bottom_power) & 0x02) != 0));
          }

  - id: !extend dump_config_list_packages
    then:
      - script.wait: dump_config
      - lambda: |-
          // Check for requirements
          #ifndef TX_ULTIMATE_EASY_COMMON
            #error "The package TX-Ultimate-Easy-ESPHome_common.yaml is required."
          #endif

          // Identify itself
          ESP_LOGCONFIG(ESPHOME_PROJECT_NAME, "  - Hardware - LEDs");
...
